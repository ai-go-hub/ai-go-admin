app:
  name: ai-go-admin
  timezone: Asia/Shanghai

server:
  # 服务端口
  port: 8080
  # 可信代理 CIDR/IP 列表
  trusted_proxies: []

token:
  driver: database
  expire:
    admin: 72           # 管理员 token 有效期，单位：小时（3 天）
    admin_remember: 720 # 管理员 token 有效期（记住登录），单位：小时（30 天）

cdn:
  # 内容分发网络 URL，末尾不带 `/`
  url:
  # 内容分发网络 URL 参数，将自动拼接到 URL 的结尾（值如 `format/heif`）
  url_params:

database:
  type: postgres
  prefix:
  write:
    host: 127.0.0.1
    port: 5432
    user: postgres
    password: "123456"
    dbname: aigo
    sslmode: disable
    max_open_conns: 25
    max_idle_conns: 10
    conn_max_lifetime: 300 # 秒
  read:
    enabled: false # 是否启用读写分离
    host: 
    port: 5433 # 读副本默认配置了不同的端口号
    user: 
    password: 
    dbname: 
    sslmode: disable
    max_open_conns: 50
    max_idle_conns: 20
    conn_max_lifetime: 300 # 秒
